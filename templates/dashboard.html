<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Dashboard Hospitalar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #f4f6f9;
}

.card {
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

.navbar {
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
<div class="container-fluid">
<span class="navbar-brand">🏥 Dashboard Hospitalar</span>
<a href="{{ url_for('menu') }}" class="btn btn-light">Voltar</a>
</div>
</nav>

<div class="container mt-4">

<!-- CARDS -->
<div class="row text-center g-3">

<div class="col-md-4">
<div class="card bg-success text-white p-3">
<h5>Baixo</h5>
<h2>{{ baixo }}</h2>
<p>{{ p_baixo }}%</p>
</div>
</div>

<div class="col-md-4">
<div class="card bg-warning p-3">
<h5>Moderado</h5>
<h2>{{ moderado }}</h2>
<p>{{ p_moderado }}%</p>
</div>
</div>

<div class="col-md-4">
<div class="card bg-danger text-white p-3">
<h5>Alto</h5>
<h2>{{ alto }}</h2>
<p>{{ p_alto }}%</p>
</div>
</div>

</div>

<!-- GRÁFICO -->
<div class="mt-5">
<canvas id="grafico"></canvas>
</div>

</div>

<!-- SCRIPT -->
<script>
    // Valores vindos do Flask (SEMPRE usar default)
    const baixo = {{ baixo | default(0) }};
    const moderado = {{ moderado | default(0) }};
    const alto = {{ alto | default(0) }};

    new Chart(document.getElementById('grafico'), {
        type: 'doughnut',
        data: {
            labels: ['Baixo', 'Moderado', 'Alto'],
            datasets: [{
                data: [baixo, moderado, alto],
                backgroundColor: [
                    '#28a745',  // verde
                    '#ffc107',  // amarelo
                    '#dc3545'   // vermelho
                ]
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    });
</script>

</body>
</html>
