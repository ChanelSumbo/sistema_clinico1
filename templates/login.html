<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background: url("{{ url_for('static', filename='img/l.png') }}") no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    background: rgba(0,0,0,0.7);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    border-radius: 15px;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(-20px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="overlay">
<div class="card p-4 shadow" style="width:350px;">

<h3 class="text-center mb-3">
    <i class="fa fa-user"></i> Login
</h3>

<!-- MENSAGEM DE ERRO -->
{% if request.method == 'POST' and erro %}
<div class="alert alert-danger text-center">
    <i class="fa fa-exclamation-triangle"></i> {{ erro }}
</div>
{% endif %}

<form method="POST">

<div class="mb-3">
    <label><i class="fa fa-user"></i> Usuário</label>
    <input type="text" name="username" class="form-control" required>
</div>

<div class="mb-3">
    <label><i class="fa fa-lock"></i> Senha</label>

    <div class="input-group">
        <input type="password" id="senha" name="password" class="form-control" required>
        <button type="button" class="btn btn-outline-secondary" onclick="mostrarSenha()">
            <i class="fa fa-eye"></i>
        </button>
    </div>
</div>

<button class="btn btn-primary w-100">
    <i class="fa fa-sign-in-alt"></i> Entrar
</button>

</form>

<div class="text-center mt-3">

    <a href="/recuperar">Esqueceu a senha?</a><br>

    <a href="/registrar" class="btn btn-success mt-2 w-100">
        <i class="fa fa-user-plus"></i> Criar Conta
    </a>

</div>

</div>
</div>

<!-- SCRIPT -->
<script>
function mostrarSenha() {
    var senha = document.getElementById("senha");
    if (senha.type === "password") {
        senha.type = "text";
    } else {
        senha.type = "password";
    }
}
</script>

</body>
</html>
