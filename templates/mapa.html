<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Mapa de Casos - Malária</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- Cluster -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>
body {
    background: #f4f6f9;
    font-family: Arial;
}

#map {
    height: 550px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.header {
    text-align: center;
    margin: 20px;
}
</style>
</head>

<body>

<div class="container">

    <!-- TÍTULO -->
    <div class="header">
        <h2>🏥 Mapa de Casos de Malária</h2>
        <a href="{{ url_for('menu') }}" class="btn btn-primary">Voltar</a>
    </div>

    <!-- MAPA -->
    <div id="map"></div>

</div>

<script>

// 📍 Coordenadas do Município do Quêlo - Angola
var map = L.map('map').setView([-6.13, 15.74], 12);

// Camada base
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// Cluster
var markers = L.markerClusterGroup();

// Dados vindos do Flask
var dados = {{ dados | tojson }};

// Lista para centralizar
var pontos = [];

// Percorrer dados
dados.forEach(function(d){

    if(d.latitude != 0 && d.longitude != 0){

        pontos.push([d.latitude, d.longitude]);

        let cor = "green";

        if(d.nivel == "Moderado") cor = "orange";
        if(d.nivel == "Alto") cor = "red";

        var marker = L.circleMarker([d.latitude, d.longitude], {
            color: cor,
            radius: 8,
            fillOpacity: 0.8
        });

        marker.bindPopup(`
            <b>🩺 Diagnóstico</b><br>
            <b>Nível:</b> ${d.nivel}<br>
            <b>Data:</b> ${d.data_registro}
        `);

        markers.addLayer(marker);
    }
});

// Adicionar ao mapa
map.addLayer(markers);

// Centralizar automaticamente
if(pontos.length > 0){
    map.fitBounds(pontos);
}

</script>

</body>
</html>
