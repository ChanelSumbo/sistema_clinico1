<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Diagnóstico de Malária</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
}

.card {
    border-radius: 15px;
}

h3 {
    font-weight: bold;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary shadow">
<div class="container-fluid">
<span class="navbar-brand">🩺 Diagnóstico de Malária</span>
<a href="/menu" class="btn btn-light">Voltar</a>
</div>
</nav>

<div class="container mt-5">

<div class="card p-4 shadow">

<h3 class="mb-4">Inserir Sintomas</h3>

<form action="/diagnostico" method="POST">

<!-- CAMPOS -->
<input name="febre" type="number" step="0.1" min="0" max="10" class="form-control mb-3" placeholder="Febre (0-10)" required>

<input name="fadiga" type="number" step="0.1" min="0" max="10" class="form-control mb-3" placeholder="Fadiga (0-10)" required>

<input name="anemia" type="number" step="0.1" min="0" max="10" class="form-control mb-4" placeholder="Anemia (0-10)" required>

<!-- GPS OCULTO -->
<input type="hidden" name="latitude" id="lat">
<input type="hidden" name="longitude" id="lon">

<!-- BOTÃO -->
<button class="btn btn-success w-100">🔍 Analisar Diagnóstico</button>

</form>

</div>

</div>

<!-- SCRIPT GPS -->
<script>
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        function(pos){
            document.getElementById("lat").value = pos.coords.latitude;
            document.getElementById("lon").value = pos.coords.longitude;
        },
        function(error){
            console.log("GPS não permitido");
        }
    );
}
</script>

</body>
</html>
