<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Diagnóstico de Malária</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}

.card{
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
<div class="container-fluid">

<span class="navbar-brand">
🩺 Sistema Clínico — Diagnóstico de Malária
</span>

<a href="{{ url_for('menu') }}" class="btn btn-light">
Voltar
</a>

</div>
</nav>

<!-- CONTAINER -->
<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card p-4">

<h3 class="text-center mb-4">
Formulário de Diagnóstico
</h3>

<form method="POST" action="{{ url_for('diagnostico') }}">

<!-- FEBRE -->
<div class="mb-3">
<label class="form-label">Febre (0 - 10)</label>
<input type="number"
       class="form-control"
       name="febre"
       step="0.1"
       min="0"
       max="10"
       required>
</div>

<!-- FADIGA -->
<div class="mb-3">
<label class="form-label">Fadiga (0 - 10)</label>
<input type="number"
       class="form-control"
       name="fadiga"
       step="0.1"
       min="0"
       max="10"
       required>
</div>

<!-- ANEMIA -->
<div class="mb-3">
<label class="form-label">Anemia (0 - 10)</label>
<input type="number"
       class="form-control"
       name="anemia"
       step="0.1"
       min="0"
       max="10"
       required>
</div>

<!-- GPS -->
<input type="hidden" id="latitude" name="latitude">
<input type="hidden" id="longitude" name="longitude">

<!-- BOTÃO -->
<div class="d-grid">
<button type="submit" class="btn btn-success">
Diagnosticar Paciente
</button>
</div>

</form>

</div>

</div>
</div>

</div>

<!-- SCRIPT GPS -->
<script>

if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(

        function(pos){
            document.getElementById("latitude").value =
                pos.coords.latitude;

            document.getElementById("longitude").value =
                pos.coords.longitude;
        },

        function(){
            console.log("GPS não permitido pelo usuário.");
        }

    );

}else{
    console.log("Geolocalização não suportada.");
}

</script>

</body>
</html>
