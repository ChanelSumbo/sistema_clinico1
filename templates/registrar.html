<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Registrar - Sistema Malária</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Ícones -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* RESET */
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
}

/* CARROSSEL */
.carousel,
.carousel-inner,
.carousel-item {
    height: 100vh;
}

.carousel-item img {
    width: 100%;
    height: 100vh;
    object-fit: cover;
    filter: brightness(60%);
}

/* OVERLAY */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 9999;
}

/* CARD */
.card {
    border-radius: 15px;
    animation: fadeIn 0.8s ease;
    width: 380px;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .card {
        width: 90%;
    }
}

</style>
</head>

<body>

<!-- 🔥 CARROSSEL -->
<div id="carouselExample" class="carousel slide carousel-fade" data-bs-ride="carousel" data-bs-interval="3000">
    <div class="carousel-inner">

        <div class="carousel-item active">
            <img src="{{ url_for('static', filename='img/l.png') }}">
        </div>

        <div class="carousel-item">
            <img src="{{ url_for('static', filename='img/r.png') }}">
        </div>

        <div class="carousel-item">
            <img src="{{ url_for('static', filename='img/c.png') }}">
        </div>

    </div>
</div>

<!-- 🔥 FORM REGISTRO -->
<div class="overlay">

    <div class="card p-4 shadow bg-white">

        <h3 class="text-center mb-3">
            <i class="fa fa-user-plus"></i> Criar Conta
        </h3>

        <!-- ERRO -->
        {% if erro %}
        <div class="alert alert-danger text-center">
            {{ erro }}
        </div>
        {% endif %}

        <!-- FORM -->
        <form method="POST">

            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Usuário" required>
            </div>

            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="mb-3">
                <div class="input-group">
                    <input type="password" name="password" id="senha" class="form-control" placeholder="Senha" required>
                    <button type="button" class="btn btn-outline-secondary" onclick="toggleSenha('senha')">👁️</button>
                </div>
            </div>

            <div class="mb-3">
                <div class="input-group">
                    <input type="password" name="confirmar" id="confirmar" class="form-control" placeholder="Confirmar senha" required>
                    <button type="button" class="btn btn-outline-secondary" onclick="toggleSenha('confirmar')">👁️</button>
                </div>
            </div>

            <button class="btn btn-success w-100">
                Criar Conta
            </button>

        </form>

        <!-- VOLTAR -->
        <div class="text-center mt-3">
            <a href="{{ url_for('login') }}">Já tem conta? Entrar</a>
        </div>

    </div>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function toggleSenha(id) {
    const campo = document.getElementById(id);
    campo.type = campo.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
