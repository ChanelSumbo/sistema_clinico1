<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Registrar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
}

.overlay {
    background: rgba(0,0,0,0.6);
    position: absolute;
    width: 100%;
    height: 100%;
}

.carousel-item img {
    height: 100vh;
    object-fit: cover;
}

.card {
    border-radius: 15px;
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(-20px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- CAROUSEL -->
<div id="carouselExample" class="carousel slide" data-bs-ride="carousel">

<div class="carousel-inner">

    <!-- IMAGEM 1 -->
    <div class="carousel-item active">
        <img src="{{ url_for('static', filename='img/r.png') }}" class="d-block w-100">
        <div class="overlay"></div>
    </div>

    <!-- IMAGEM 2 -->
    <div class="carousel-item">
        <img src="{{ url_for('static', filename='img/c.png') }}" class="d-block w-100">
        <div class="overlay"></div>
    </div>

</div>

</div>

<!-- FORMULÁRIO -->
<div class="position-absolute top-50 start-50 translate-middle">

<div class="card p-4 shadow" style="width:350px;">

<h3 class="text-center mb-3">
<i class="fa fa-user-plus"></i> Criar Conta
</h3>

<form method="POST">

<div class="mb-3">
<input type="text" name="username" placeholder="Usuário" class="form-control" required>
</div>

<div class="mb-3">
<input type="password" name="password" placeholder="Senha" class="form-control" required>
</div>

<button class="btn btn-success w-100">
<i class="fa fa-user-plus"></i> Registrar
</button>

</form>

<div class="text-center mt-3">
<a href="{{ url_for('login') }}" class="btn btn-secondary w-100">Voltar</a>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
